<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Melhor Resultado — Visualizador de Corrida</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/loading.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header__title">Melhor Resultado</h1>

      <div class="controls">
        <div class="controls__url-row">
          <input
            type="text"
            id="source-url"
            class="input"
            placeholder="URL dos resultados..."
            autocomplete="url"
            inputmode="url"
            enterkeyhint="go"
          >
          <div class="controls__actions">
            <button type="button" id="btn-process" class="btn btn--primary btn--icon" title="Processar" aria-label="Processar">
              <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 12h14"/>
                <path d="M13 6l6 6-6 6"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="search-autocomplete">
          <input
            type="search"
            id="search-input"
            class="input input--search"
            placeholder="Nome, número ou equipe..."
            autocomplete="off"
            enterkeyhint="search"
            role="combobox"
            aria-expanded="false"
            aria-controls="search-suggestions"
            aria-autocomplete="list"
            disabled
          >
          <ul
            id="search-suggestions"
            class="search-autocomplete__list"
            role="listbox"
            hidden
          ></ul>
        </div>
      </div>
    </header>

    <div id="alert-container" class="alert-container" role="alert" aria-live="polite"></div>

    <main id="results-container" class="results"></main>

    <footer class="footer">
      <p class="footer__text">
        Desenvolvido por
        <a
          class="footer__link"
          href="https://github.com/fellipeborges/melhor-resultado"
          target="_blank"
          rel="noopener noreferrer"
        >Fellipe Borges</a>
        com ajuda de IA
      </p>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
